name: Sync Subsystem field (one label)

on:
  issues:
    types: [opened, labeled]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/FRC-1250/projects/15
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Subsystem field from label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            if (!labels.includes("subsystem:CHASSIS")) {
              console.log("No CHASSIS label, skipping");
              return;
            }

            console.log("CHASSIS label found — next step will set field");
